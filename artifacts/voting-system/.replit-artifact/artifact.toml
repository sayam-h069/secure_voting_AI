kind = "web"
previewPath = "/"
title = "AI Voting System"
version = "1.0.0"
id = "artifacts/voting-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18932

[services.development]
run = "pnpm --filter @workspace/voting-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voting-system", "run", "build" ]
publicDir = "artifacts/voting-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18932"
BASE_PATH = "/"
